services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    ports:
      - "5432:5432"
    volumes:
      # schema.sql is applied automatically on first boot of an empty data dir.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/api"]
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline?sslmode=disable
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/worker", "--stage=extraction"]
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  classification-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/worker", "--stage=classification"]
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline?sslmode=disable
      CLASSIFIER: ${CLASSIFIER:-mock}
      CLASSIFY_BATCH_SIZE: ${CLASSIFY_BATCH_SIZE:-10}
      CLASSIFY_DEMO_DELAY: ${CLASSIFY_DEMO_DELAY:-50ms}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      postgres:
        condition: service_healthy
    # Scale this stage independently:  docker compose up --scale classification-worker=5
